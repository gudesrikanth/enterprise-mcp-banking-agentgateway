# AKS flavor of the gateway parameters: ingress via an Azure Load Balancer AND
# the agentgateway proxy joined to the Istio ambient mesh (so the proxy->MCP hop
# is mTLS and mesh-load-balanced). Apply this INSTEAD of the minikube
# bank-platform/.../10-gateway.yaml parameters on AKS.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayParameters
metadata:
  name: agentgateway-config
  namespace: agentgateway-system
spec:
  logging:
    level: info
  service:
    spec:
      type: LoadBalancer          # (1) Azure Load Balancer spreads across replicas
    metadata:
      annotations:
        # internal (private VNet) LB — drop this annotation for a public LB:
        service.beta.kubernetes.io/azure-load-balancer-internal: "true"
  deployment:
    spec:
      replicas: 2                 # LB targets; scale with HPA in production
      template:
        metadata:
          labels:
            istio.io/dataplane-mode: ambient   # (3) join the mesh → mTLS east-west
---
# The agentgateway proxy itself: the enterprise controller provisions a
# Deployment + Service named after this Gateway (agentgateway-proxy) from the
# parameters above. The HTTPRoute (k8s/20-federation.yaml) and the JWT/RBAC/
# rate-limit/telemetry policies all targetRef this Gateway by name. On minikube
# this lived in the shared mcp-playground install; on a fresh AKS cluster it must
# be created here or no proxy/service exists.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy
  namespace: agentgateway-system
spec:
  gatewayClassName: enterprise-agentgateway
  infrastructure:
    parametersRef:
      group: enterpriseagentgateway.solo.io
      kind: EnterpriseAgentgatewayParameters
      name: agentgateway-config
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
