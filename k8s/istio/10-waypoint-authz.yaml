# L7 east-west authorization via an Envoy WAYPOINT for the bank namespace.
# Defense in depth: even though Entra JWT + RBAC gate tool access at the edge,
# the mesh independently enforces "only the agentgateway proxy identity may reach
# the bank services" — a stolen pod identity cannot call bank-core directly.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: bank-waypoint
  namespace: bank
  labels:
    istio.io/waypoint-for: service     # waypoint handles L7 for services in this ns
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
---
# Only workloads using the agentgateway proxy's service account may call the MCP
# servers and bank-core. (Adjust the principal to your proxy's SA.)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: bank-allow-from-gateway
  namespace: bank
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/agentgateway-system/sa/agentgateway-proxy"
    # also allow intra-bank calls (mcp-* -> bank-core)
    - from:
        - source:
            namespaces: ["bank"]
