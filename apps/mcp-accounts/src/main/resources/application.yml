server:
  port: 8090
spring:
  application:
    name: mcp-accounts
  ai:
    mcp:
      server:
        annotation-scanner:
          enabled: true
        name: mcp-accounts
        version: 0.1.0
        type: sync
        protocol: streamable
        streamable-http:
          mcp-endpoint: /mcp
        instructions: >
          Read-only retail-bank account tools: list_accounts, get_account,
          get_balance, list_transactions.
        capabilities:
          tool: true
bank:
  core-url: http://localhost:8081
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
