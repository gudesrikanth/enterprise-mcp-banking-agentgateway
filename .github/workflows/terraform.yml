name: terraform

on:
  pull_request:
    paths: ['infra/terraform/**', '.github/workflows/terraform.yml']

  push:
    branches: [main]
    paths: ['infra/terraform/**', '.github/workflows/terraform.yml']

  workflow_dispatch:
    inputs:
      action:
        description: 'plan | apply | destroy'
        type: choice
        default: plan
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform:
    runs-on: ubuntu-latest

    environment: ${{ (github.event_name == 'push' || github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy') && 'production' || '' }}

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------
      # Azure Login (OIDC - FIXED & STABLE)
      # -------------------------
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: false

      # -------------------------
      # Verify Azure context (azure/login@v2 above already set it)
      # -------------------------
      - name: Verify Azure context
        run: |
          az account show -o table
          az account list -o table

      # -------------------------
      # Terraform setup
      # -------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      # -------------------------
      # Init remote backend
      # -------------------------
      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=bank-platform.tfstate"

      # -------------------------
      # Validation
      # -------------------------
      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate -no-color

      # -------------------------
      # Plan
      # -------------------------
      - name: Terraform Plan
        if: github.event.inputs.action != 'destroy'
        run: terraform plan -no-color -input=false -out=tfplan

      # -------------------------
      # Apply
      # -------------------------
      - name: Terraform Apply
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        run: terraform apply -no-color -input=false tfplan

      # -------------------------
      # Destroy
      # -------------------------
      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -no-color -input=false -auto-approve
